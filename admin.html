<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإدارة | متجر ريتال</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{ --ol:#6b7c4a; --cr2:#faf7ef; --dk:#2a2a1e; --tx:#5a5a40; --wh:#fff; --bd:rgba(107,124,74,.18); --rd:#e05050; --shadow:0 8px 30px rgba(42,42,30,.06); }
body { font-family: 'Tajawal', sans-serif; background: var(--cr2); color: var(--dk); }

#loginArea { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--dk); }
.login-box { background: var(--wh); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; box-shadow: var(--shadow); }
.login-box h2 { color: var(--ol); margin-bottom: 25px; font-weight: 900; font-family: 'Tajawal', sans-serif;}
.login-box input { width: 100%; padding: 15px; border: 1px solid var(--bd); border-radius: 12px; margin-bottom: 20px; font-family: 'Tajawal'; text-align: center; font-size: 16px; outline:none; }
.login-box input:focus { border-color: var(--ol); }
.login-box button { width: 100%; background: var(--ol); color: var(--wh); border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Tajawal';}
.login-box button:hover { background: #5a693e; }

#adminPanel { display: none; padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--wh); padding: 20px 30px; border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--bd); }
header h1 { color: var(--ol); font-weight: 900; font-size: 24px;}
.header-actions { display: flex; gap: 15px; }
.btn { padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Tajawal'; border: none; transition: 0.3s; text-decoration: none;}
.btn-danger { background: rgba(224,80,80,.1); color: var(--rd); }
.btn-danger:hover { background: var(--rd); color: var(--wh); }
.btn-dark { background: var(--dk); color: var(--wh); }
.btn-dark:hover { background: #111; }

.tabs { display: flex; gap: 15px; margin-bottom: 30px; }
.tab-btn { background: var(--wh); border: 1px solid var(--bd); padding: 12px 25px; border-radius: 12px; font-weight: 800; color: var(--tx); cursor: pointer; font-family: 'Tajawal'; transition: 0.3s;}
.tab-btn.active { background: var(--ol); color: var(--wh); border-color: var(--ol); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--wh); padding: 25px; border-radius: 20px; border: 1px solid var(--bd); box-shadow: var(--shadow); text-align: center; }
.stat-num { font-size: 36px; font-weight: 900; color: var(--ol); line-height: 1; margin-bottom: 5px; }
.stat-title { font-size: 14px; color: var(--tx); font-weight: 700; }

.table-wrapper { background: var(--wh); border-radius: 20px; border: 1px solid var(--bd); overflow-x: auto; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; text-align: right; min-width: 900px;}
th { background: rgba(107,124,74,.05); padding: 18px 20px; color: var(--ol); font-weight: 800; border-bottom: 2px solid var(--bd); font-size: 15px;}
td { padding: 18px 20px; border-bottom: 1px solid var(--bd); font-weight: 500; font-size: 14px; vertical-align: middle;}
tr:last-child td { border-bottom: none; }
.status-sel { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--bd); font-family: 'Tajawal'; font-weight: 700; outline: none; background: var(--cr2); cursor: pointer;}
.del-row-btn { background: rgba(224,80,80,.1); color: var(--rd); border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
.del-row-btn:hover { background: var(--rd); color: var(--wh); }

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
.settings-card { background: var(--wh); padding: 30px; border-radius: 20px; border: 1px solid var(--bd); box-shadow: var(--shadow); }
.settings-card h3 { color: var(--dk); margin-bottom: 20px; font-weight: 800; border-bottom: 2px solid var(--cr2); padding-bottom: 10px;}
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--tx); }
.form-group input { width: 100%; padding: 12px; border: 1px solid var(--bd); border-radius: 10px; font-family: 'Tajawal'; outline: none; }
.form-group input:focus { border-color: var(--ol); }
.save-btn { background: var(--ol); color: var(--wh); border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-family: 'Tajawal'; cursor: pointer; width: 100%; margin-top: 10px;}

@media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loginArea">
  <div class="login-box">
    <h2>ريتال - الإدارة</h2>
    <input type="password" id="adminPass" placeholder="أدخل الرقم السري">
    <button onclick="login()">دخول للوحة التحكم</button>
  </div>
</div>

<div id="adminPanel">
  <header>
    <h1>لوحة تحكم ريتال 📦</h1>
    <div class="header-actions">
      <button class="btn btn-dark" onclick="location.reload()">تسجيل الخروج</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ordersTab', this)">الطلبات</button>
    <button class="tab-btn" onclick="switchTab('settingsTab', this)">الإعدادات والأكواد ⚙️</button>
  </div>

  <div id="ordersTab" class="tab-content active">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="totalOrdersCount">0</div>
        <div class="stat-title">إجمالي الطلبات</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="totalRevenue">0</div>
        <div class="stat-title">إجمالي المبيعات (ر.س)</div>
      </div>
      <div class="stat-card">
        <button class="btn btn-danger" style="width: 100%; height: 100%; font-size: 16px;" onclick="clearAllOrders()">حذف جميع الطلبات 🗑️</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>الطلب</th>
            <th>العميل</th>
            <th>العنوان</th>
            <th>الكمية</th>
            <th>الإجمالي</th>
            <th>حالة الطلب</th>
            <th>التاريخ</th>
            <th>حذف</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <div id="settingsTab" class="tab-content">
    <div class="settings-grid">
      
      <div class="settings-card">
        <h3>💰 تعديل سعر المنتج</h3>
        <div class="form-group">
          <label>السعر الأساسي للمنتج (ر.س)</label>
          <input type="number" id="basePriceInput" placeholder="مثال: 30">
        </div>
        <button class="save-btn" onclick="saveBasePrice()">حفظ السعر الجديد</button>
        <p style="font-size: 12px; color: var(--tx); margin-top: 10px; text-align: center;">سيتغير السعر فوراً في المتجر للعملاء.</p>
      </div>

      <div class="settings-card">
        <h3>🎟️ إدارة أكواد الخصم</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <div class="form-group" style="flex: 2; margin-bottom: 0;">
            <input type="text" id="couponCode" placeholder="رمز الكود (مثال: KSA20)">
          </div>
          <div class="form-group" style="flex: 1; margin-bottom: 0;">
            <input type="number" id="couponDiscount" placeholder="الخصم %">
          </div>
          <button class="save-btn" style="margin-top: 0; flex: 1;" onclick="addCoupon()">إضافة</button>
        </div>
        
        <div id="couponsList"></div>
      </div>

    </div>
  </div>
</div>

<script>
function login() {
  const pass = document.getElementById('adminPass').value;
  if(pass === 'admin123') { 
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderDashboard();
    loadSettings();
  } else { alert('الرقم السري غير صحيح!'); }
}

function switchTab(tabId, btnElement) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btnElement.classList.add('active');
}

function renderDashboard() {
  let orders = JSON.parse(localStorage.getItem('rital_orders')) || [];
  const tbody = document.getElementById('ordersBody');
  
  document.getElementById('totalOrdersCount').innerText = orders.length;
  document.getElementById('totalRevenue').innerText = orders.filter(o => o.status !== 'cancelled').reduce((sum, o) => sum + o.total, 0);

  tbody.innerHTML = '';
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px;">لا توجد طلبات حتى الآن.</td></tr>';
    return;
  }

  tbody.innerHTML = orders.map(o => `
    <tr>
      <td><strong>${o.id}</strong></td>
      <td>${o.customerName}<br><a href="https://wa.me/966${o.customerPhone.replace(/^0/,'')}" target="_blank" style="color:var(--ol); font-size:12px; text-decoration:none;">${o.customerPhone}</a></td>
      <td style="max-width:200px; line-height:1.4;">${o.fullAddress}</td>
      <td><strong>${o.qty}</strong></td>
      <td><strong>${o.total}</strong> ر.س<br><span style="font-size:11px; color:#d35400;">${o.discountNote || ''}</span></td>
      <td>
        <select class="status-sel" onchange="changeStatus('${o.id}', this.value)" style="color: ${o.status === 'new' ? '#d35400' : (o.status === 'done' ? 'var(--ol)' : 'var(--rd)')}">
          <option value="new" ${o.status==='new'?'selected':''}>🆕 جديد</option>
          <option value="done" ${o.status==='done'?'selected':''}>✅ مكتمل</option>
          <option value="cancelled" ${o.status==='cancelled'?'selected':''}>❌ ملغي</option>
        </select>
      </td>
      <td style="font-size:12px;color:var(--tx)">${o.date}</td>
      <td><button class="del-row-btn" onclick="deleteOrder('${o.id}')">🗑️</button></td>
    </tr>
  `).join('');
}

function changeStatus(id, status) {
  let orders = JSON.parse(localStorage.getItem('rital_orders')) || [];
  const o = orders.find(x => x.id === id);
  if (o) { o.status = status; localStorage.setItem('rital_orders', JSON.stringify(orders)); renderDashboard(); }
}

function deleteOrder(id) {
  if (!confirm('حذف هذا الطلب؟')) return;
  let orders = JSON.parse(localStorage.getItem('rital_orders')) || [];
  orders = orders.filter(o => o.id !== id);
  localStorage.setItem('rital_orders', JSON.stringify(orders));
  renderDashboard();
}

function clearAllOrders() {
  if (!confirm('سيتم مسح كافة الطلبات! هل أنت متأكد؟')) return;
  localStorage.removeItem('rital_orders');
  renderDashboard();
}

function loadSettings() {
  let basePrice = localStorage.getItem('rital_base_price') || 30;
  document.getElementById('basePriceInput').value = basePrice;
  renderCoupons();
}

function saveBasePrice() {
  const newPrice = document.getElementById('basePriceInput').value;
  if(newPrice > 0) {
    localStorage.setItem('rital_base_price', newPrice);
    alert('تم حفظ السعر الجديد وتحديث المتجر!');
  }
}

function renderCoupons() {
  let coupons = JSON.parse(localStorage.getItem('rital_coupons')) || [];
  const list = document.getElementById('couponsList');
  if(coupons.length === 0) {
    list.innerHTML = '<p style="text-align:center; color:#999; font-size:15px; padding: 20px; border: 1px dashed var(--bd); border-radius: 12px;">لا توجد أكواد خصم نشطة حالياً.</p>';
    return;
  }
  list.innerHTML = coupons.map((c, index) => `
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--wh); border: 2px dashed var(--ol); border-radius: 12px; margin-bottom: 12px; box-shadow: var(--shadow);">
      <div style="display: flex; align-items: center; gap: 15px;">
        <div style="background: var(--ol); color: var(--wh); padding: 8px 18px; border-radius: 8px; font-weight: 900; font-size: 18px; letter-spacing: 1px; font-family: Tahoma, sans-serif;">${c.code}</div>
        <div style="color: var(--dk); font-weight: 700; font-size: 16px;">مقدار الخصم: <span style="color: #d35400; font-size: 22px; font-weight: 900;">${c.percent}%</span></div>
      </div>
      <button class="del-row-btn" style="width: 40px; height: 40px; border-radius: 10px; font-size: 18px; display: flex; align-items: center; justify-content: center;" onclick="deleteCoupon(${index})" title="حذف الكود">🗑️</button>
    </div>
  `).join('');
}

function addCoupon() {
  const code = document.getElementById('couponCode').value.toUpperCase();
  const percent = document.getElementById('couponDiscount').value;
  
  if(code && percent > 0 && percent <= 100) {
    let coupons = JSON.parse(localStorage.getItem('rital_coupons')) || [];
    if(coupons.find(c => c.code === code)) {
      alert('هذا الكود موجود مسبقاً!'); return;
    }
    coupons.push({ code: code, percent: parseInt(percent) });
    localStorage.setItem('rital_coupons', JSON.stringify(coupons));
    document.getElementById('couponCode').value = '';
    document.getElementById('couponDiscount').value = '';
    renderCoupons();
  } else {
    alert('الرجاء إدخال كود صحيح ونسبة خصم بين 1 و 100');
  }
}

function deleteCoupon(index) {
  let coupons = JSON.parse(localStorage.getItem('rital_coupons')) || [];
  coupons.splice(index, 1);
  localStorage.setItem('rital_coupons', JSON.stringify(coupons));
  renderCoupons();
}
</script>
</body>
</html>
