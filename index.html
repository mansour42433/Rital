<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر ريتال | الرئيسية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --ol:#6b7c4a; --ol2:#8fa060; --cr2:#faf7ef; --dk:#2a2a1e; --tx:#5a5a40; --wh:#fff; --bd:rgba(107,124,74,.18); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: var(--cr2); color: var(--dk); overflow-x: hidden; }
  nav { position: fixed; top: 0; width: 100%; padding: 20px 5%; background: rgba(250,247,239,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--bd); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  .logo { font-size: 28px; font-weight: 900; color: var(--ol); text-decoration: none; }
  .cart-btn { background: var(--ol); color: var(--wh); padding: 10px 25px; border-radius: 30px; text-decoration: none; font-weight: 700; transition: 0.3s; display: inline-block;}
  .cart-btn:hover { background: var(--dk); transform: translateY(-2px); }
  
  .hero { min-height: 100vh; display: flex; align-items: center; justify-content: space-between; padding: 100px 5% 50px; gap: 40px; }
  .hero-text { flex: 1; max-width: 600px; }
  .hero-text h1 { font-size: clamp(35px, 5vw, 55px); font-weight: 900; line-height: 1.3; margin-bottom: 15px; color: var(--dk); }
  .hero-text p { font-size: 18px; color: var(--tx); margin-bottom: 30px; line-height: 1.8; }
  .price { font-size: 40px; font-weight: 900; color: var(--ol); margin-bottom: 30px; display: block; }
  
  .hero-img { flex: 1; display: flex; justify-content: center; }
  .hero-img img { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid var(--bd); }
  
  footer { text-align: center; padding: 30px; background: var(--wh); border-top: 1px solid var(--bd); }
  .admin-link { display: inline-block; margin-top: 15px; color: var(--tx); text-decoration: none; font-size: 14px; font-weight: 700; border: 1px solid var(--bd); padding: 8px 20px; border-radius: 20px; transition: 0.3s; }
  .admin-link:hover { background: var(--ol); color: var(--wh); }

  @media (max-width: 768px) { .hero { flex-direction: column; text-align: center; padding-top: 120px; } }
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">متجر ريتال</a>
  <a href="checkout.html" class="cart-btn">السلة 🛒</a>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>عناية فائقة،<br>لأنكِ تستحقين الأفضل.</h1>
    <p>كريم الجسم الفاخر من متجر ريتال. تركيبة طبيعية تمنح بشرتك الترطيب العميق والنعومة الحريرية والإشراقة التي تدوم طوال اليوم.</p>
    
    <span class="price" id="mainPriceDisplay">30 ر.س</span>
    
    <a href="checkout.html" class="cart-btn" style="font-size: 20px; padding: 15px 40px;">أضف للسلة 🛒</a>
  </div>
  <div class="hero-img">
    <img src="photo_2026-03-12_02-18-30 (2).jpg" alt="كريم ريتال" onerror="this.src='https://via.placeholder.com/400x500?text=صورة+المنتج'">
  </div>
</section>

<footer>
  <p>© 2026 متجر ريتال. جميع الحقوق محفوظة.</p>
  <a href="admin.html" class="admin-link">⚙️ دخول الإدارة</a>
</footer>

<script>
  window.onload = function() {
    let basePrice = localStorage.getItem('rital_base_price') || 30;
    document.getElementById('mainPriceDisplay').innerText = basePrice + ' ر.س';
  };
</script>

</body>
</html>
